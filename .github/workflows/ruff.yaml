name: Linting
on: [pull_request, push]

jobs:
  ruff-checks:
    name: "Ruff Checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: |
          if ! ruff format --check --output-format=github
          then
            ruff format
            git diff
            exit 1
          fi
      - name: Run ruff
        run: ruff check zoidberg --output-format=github
        
